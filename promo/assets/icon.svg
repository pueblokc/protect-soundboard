<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#313244"/>
      <stop offset="0.55" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#11111b"/>
    </linearGradient>
    <linearGradient id="horn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#89b4fa"/>
      <stop offset="1" stop-color="#cba6f7"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="siren" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f38ba8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f38ba8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- rounded-square tile -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="240" rx="108" fill="url(#gloss)"/>
  <rect x="17" y="17" width="478" height="478" rx="107" fill="none" stroke="#89b4fa" stroke-opacity="0.18" stroke-width="2"/>

  <!-- siren glow behind the mouth of the horn -->
  <circle cx="372" cy="256" r="120" fill="url(#siren)"/>

  <!-- megaphone body (pointing right, mouth open toward sound waves) -->
  <g stroke-linejoin="round" stroke-linecap="round">
    <path d="M150 210
             L150 302
             L210 302
             L300 360
             L300 152
             L210 210 Z"
          fill="url(#horn)"/>
    <!-- handle -->
    <path d="M196 302 L196 352 a18 18 0 0 0 36 0 L232 320"
          fill="none" stroke="url(#horn)" stroke-width="22"/>
    <!-- inner gloss on the cone -->
    <path d="M210 210 L210 302 L150 302 L150 210 Z" fill="#ffffff" opacity="0.10"/>
  </g>

  <!-- sound / alarm waves -->
  <g fill="none" stroke-linecap="round" filter="url(#soft)">
    <path d="M330 196 a78 78 0 0 1 0 120" stroke="#a6e3a1" stroke-width="20"/>
    <path d="M372 168 a126 126 0 0 1 0 176" stroke="#f9e2af" stroke-width="20"/>
    <path d="M414 142 a172 172 0 0 1 0 228" stroke="#fab387" stroke-width="20"/>
  </g>
  <g fill="none" stroke-linecap="round">
    <path d="M330 196 a78 78 0 0 1 0 120" stroke="#a6e3a1" stroke-width="20"/>
    <path d="M372 168 a126 126 0 0 1 0 176" stroke="#f9e2af" stroke-width="20"/>
    <path d="M414 142 a172 172 0 0 1 0 228" stroke="#fab387" stroke-width="20"/>
  </g>
</svg>
